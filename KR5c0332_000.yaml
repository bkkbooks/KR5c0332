body:
  text: 白雲仙人靈草歌種芝草法白雲仙人靈草歌序文缺達道草紫花青莖葉結汞事如何莫拋靈草歌只知赤勤好偏用達道多此草獨體成砂子白祿草色青海寶草花紅莖萼葉並青十年學仙術靈草少知青白祿堪為匱海寶善軟金生在沙岡上常得道家欽朱內抽真汞花紅根自深此二草皆能軟五金紫枝草淺黑花莖蕚葉並青此草有不稀出土並三枝朱砂見寶白煮汞自然癡合穗草分心花紅淺紫蘂莖葉青天降神匱草無過訪合穗燒藥實堪誇不與凡草揆衆草經霜軟此草不憔悴塞暑不相侵燒藥添智慧此草能匱大藥望仙草紅花緑葉春生草鋪煙未上摘望仙伏朱砂作汁結汞汞便乾金蓮草紅花緑葉燒丹偏教玄但採草金蓮衆藥堪為匱遇凡不須言玊液草花紅葉緑玉液草能紅大藥與相通偏匱草砂子見寶有殊功大祕草花紅葉録大道須懷志此草深要記四神偏能伏兼燒大二氣金風草子黑根白花葉青仙家惜似掌中珍真汞煮作硬砂子白體成庚重不輕仙人欽草此草花紅葉緑有角子生於大林之內味甘偏伏白硫黃寶劔草此草並生三莖花黃子黑生於沙地上味苦汁白偏伏獨體朱砂作汁拒火林泉草此草有如萱草生於大林之間花紅葉緑味甘能伏獨體雄黃地榆草色青生在荒地之傍味澀能伏硇砂煮石服之少病身輕金線草此草生在山澗之畔花黃葉青味辛應是諸般砂子以花葉裹之便拒大火矣地寶草細葉直莖並暗緑色此草生於水次之中葉細味苦偏伏雄砂作汁拒火如琥珀色大通草此草花紅葉青子黑味甘生在河次之傍以自然汁結作砂子大通花紅葉似青子黑根白味不辛一生長善河次畔獨體結成砂子真天降草此草生黃砂地內花青葉緑子紅味辛伏四神丹此祕要隱八般草並堪結砂子也芝草延年壽五鳯結成珍六龍堪為匱七寶善養庚玊柱能香美青泉苦味辛萬通偏煮汞天降立制成惹羅衣草此草生於林畔味辛能伏粉霜拒大火作汁出羣葉緑順五枝見寶雄煮事相依煮汞成珍作砂子五金偏道定相宜大道草此草生於沙地之中味甘葉青子白一花結二子大制砂子抽汞大道名髙以傳聲隂陽二氣子雙新抽汞使來經數載不知標在出靈真祕曰大道草葉細一花結二子抽汞自然新水銀見即死長生草此草生在水次味甘子紅大伏砒此草功龍世所稀不遇真本少人知仙家異呼長生草偏解常燒伏火砒白鶴草此草生在大林之中味苦花紅葉青獨結砂子白鶴偏有功葉青花自紅獨體伏真汞長生在林中磨羅草青莖緑葉紫花白汁多大道號磨羅不但延年壽伏藥樞使多五雲草鳯青草紅花緑葉志道要超升須訪神草經聖事常冝重非人莫謾輕恐折人間壽看似掌中珍欲知庚汞了須採草鳯青顯志草此草生居大林中味甘花黃子黑葉緑以汁能煮真汞砂也顯志實堪誇雪內放黃花寒暑不相礙獨體草結砂玉柱草碧花青葉此草研自然汁和硫黃乾濕停勻入於定州合子之中以文火養赤後大火煆一宿成白硫黃拒火作汁明月草水紅草紅花青葉赤梗天生號水紅伏汞意不重偏伏硇砂白兼匱大雌雄此草兼堪服食大治水氣之病紅焰草此草生於水中花紅葉緑味辛應是草結砂子及諸般石結砂子並於紅焰草中皆匱十分無失地蕉草花紅子黑莖葉青伏藥偏清髙無過採地蕉不但抽真汞兼伏石中硝地蕉能伏硝石抽汞實山草花紅葉緑靈草號寶山生居大林間仙家偏祕借價直萬千錢此草汁煮汞便成硬砂子亦匱見寶砂小白祿草花紅莖蕚葉並青此草花紅葉緑生髙岡之上味辛每要伏人間飛走者藥膩粉水銀及食者之藥並皆燒無失也小金線草花紅葉緑靈草並光鮮金線力最堅便是稀砂子葉裹自然乾此草味辛生於大林之內能制大藥應活汞砂但將裏之入火便成寶也真珠草靈苗匱藥好無過真珠草伏藥定無憂服食人不老此草汁味甘花黃生於深林之中遇者延年無病金鸞草大道祕金鸞仙家亦不傳堪作庚汞匱採寶勝湧泉此草生於河次之畔黃花葉緑能制樞庚汞堪作湧泉匱海石榴草花紅葉緑採汞不知休無過海石榴不遇靈草本將心那邊求此草味苦結得子却甘如是活汞粘著草汁便枯亦名枯汞草紅藍草缺聚珍草莖葉並緑天降號聚珍四季葉長青凡人多不識看似掌中金服食添長命生餐善治心不是真仙本世間少知音此草生沙岡之上味甘能燒衆藥無失海桃草靈枝號海桃生服善治勞不但添人壽兼軟汞與錨此草生於大林之中大治勞疾花黃葉緑味苦能軟五金矣金燈草此草味教辛仙家喚金燈生服能治病一載自身輕伏砒砒能白結汞汞轉新不然濟人命兼取汞中庚此草味辛生於髙坡之上花紫葉緑抽汞伏庚山青草仙草名山青根株似黃精人服髮再黑偏療小兒驚燒藥堪為匱秋夏葉長新此草生於髙林之內味甘花紅葉青兼匱硫黃萬通草大道依仙蹤方顯有神功三黃成真體白虎是一宗金丹求靈草石匱卒難窮欲知鉛汞了須採草萬通此草生於白沙之地味澀花青葉緑服之令人長壽無病偏匱大藥不失白珠草黃花緑葉大道與仙同須向草中功金石能飛走靈草自相通但依真仙草製向鉛汞中欲得金丹就採取草山紅此草生於髙岡之內或於土山之上花紅葉緑味甘人服之延命一千歲龍泉草萬物萌芽在春前只有龍泉出土先見寶朱砂用葉裹自然汁煮汞成乾此草生於深草之中花青子黑服之者令人身輕無病實峯草大道居鄽市訪道莫西東但求真鉛汞四事總相通聖事依指教不越大仙蹤欲知黃芽現須採草寶峯此草花紅葉緑子黑味辛服食令人一生無病身輕駐顏兼匱大藥善取黃芽金錢草了道與延年無過訪金錢服食添人壽乾汞兼駐顏此草生於深草之內服食令人無病味甘花黃汁白葉緑獨成砂子仙娥草造化紫河車不及草仙娥能伏飛流藥大道知也麼此草生於青沙之地花黃葉緑味甘伏諸藥無失黃芽草花葉能青緑根白色似金黃芽生遍地識者有幾人此草根善治牙疼青金草黃花緑葉久聞有靈草不過青金好葉緑枝條嫩服食人不老此草生於水次偏治惡瘡七星草此草生於名山之中有人遇者生服之可以不死延年矣花青葉紅味甘兼制大藥山漿草山漿草味酸花紅生於黃沙之地偏治人間瘧病兼匱硫黃銀線草花紅子黑莖葉青此草生於名山之中大治風疾之病花紅子黑味甘能伏硇砂宜男草花紅葉青枝萼並青此草生於名山之中有人得見便採服之壽命五百歲味甘花紅子青葉緑金羅草花黃枝葉青此草生於松樹之下花黃味辛遇者服之千年不死兼制大藥矣楊桃草棘紫草青楊桃草白汁生於棘針之上能伏朱砂大治惡瘡百金草花紅枝葉並青此草生於大林之內花紅味甘大伏真汞祕曰七十二草總有靈各伏丹砂並通神不是上方留下界凡世俗流少聽聞白雲仙人靈草歌終
