front:
  text: 二篇同卷如十
  hash: sha256:f859ad79233a9f96b9a9aed8163ac04c7bab0a7d376d243099f7362d67b26169
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0332_HFL_000-001a, image: hfl/0597/0597-152.png}
body:
  text: 白雲仙人靈草歌種芝草法白雲仙人靈草歌序文缺達道草紫花青莖葉結汞事如何莫抛靈草歌只知赤勤好偏用達道多此草獨體成砂子白禄草色青海寶草花紅莖萼葉並青十年學仙術靈草少知青白禄堪爲櫃海寳善軟金生在沙崗上常得道家欽朱内抽眞汞花紅根自深此二草皆能軟五金紫枝草淺黑花莖蕚葉並青此草有不稀岀土並三枝朱砂見寶白煑汞自然癡合穗草分心花紅淺紫蘂莖葉青天降神櫃草無過訪合穂燒藥實堪誇不與凡草揆衆草經霜軟此草不憔悴塞暑不相侵焼藥添智慧此草能櫃大藥望仙草紅花緑葉春生草鋪煙未上摘望仙伏朱砂作汁結汞汞便乾金蓮草紅花緑葉燒丹偏教玄但採草金蓮衆藥堪爲櫃遇凡不須言玊液草花紅葉緑玉液草能紅大藥與相通偏櫃草砂子見寶有殊功大秘草花紅葉録大道須懷志此草深要記四神偏能伏兼燒大二氣金風草子黑根白花葉青仙家惜似掌中珍真汞煑作硬砂子白體成庚重不輕仙人欽草此草花紅葉緑有角子生於大林之内味甘偏伏白硫黄寶劔草此草並生三莖花黄子黑生於沙地上味苦汁白偏伏獨體朱砂作汁拒火林泉草此草有如萱草生於大林之間花紅葉緑味甘能伏獨體雄黄地榆草色青生在荒地之傍味澁能伏硇砂煑石服之少病身輕金線草此草生在山澗之畔花黄葉青味辛應是諸般砂子以花葉裹之便拒大火矣地寶草細葉直莖並暗緑色此草生於水次之中葉細味苦偏伏雄砂作汁拒火如琥珀色大通草此草花紅葉青子黑味甘生在河次之傍以自然汁結作砂子大通花紅葉似青子黑根白味不辛一生長善河次畔獨體結成砂子眞天降草此草生黄砂地内花青葉緑子紅味辛㐲四神丹此秘要隱八般草並堪結砂子也芝草延年壽五鳯結成珍六龍堪爲櫃七寶善養庚玊柱能香羙青泉苦味辛萬通偏煑汞天降立制成惹羅衣草此草生於林畔味辛能伏粉霜拒大火作汁岀羣葉緑順五枝見寶雄煑事相依煑汞成珍作砂子五金偏道定相宜大道草此草生於沙地之中味甘葉青子白一花結二子大制砂子抽汞大道名髙以傳聲隂陽二氣子雙新抽汞使來經數載不知標在出靈眞秘曰大道草葉細一花結二子抽汞自然新水銀見即死長生草此草生在水次味甘子紅大伏砒此草功龍世所稀不遇眞本少人知仙家異呼長生草偏解常燒伏火砒白鶴草此草生在大林之中味苦花紅葉青獨結砂子白鶴偏有功葉青花自紅獨體伏眞汞長生在林中磨羅草青莖緑葉紫花白汁多大道號磨羅不但延年壽伏藥樞使多五雲草鳯青草紅花緑葉志道要超昇须訪神草經聖事常冝重非人莫謾輕恐折人間壽看似掌中珍欲知庚汞了须採草鳯青顯志草此草生居大林中味甘花黄子黑葉緑以汁能煑眞汞砂也顯志實堪誇雪内放黄花寒暑不相礙獨體草結砂玉柱草碧花青葉此草硏自然汁和硫黄乾濕停匀入於定州合子之中以文火養赤後大火鍜一宿成白硫黄拒火作汁明月草水紅草紅花青葉赤梗天生號水紅伏汞意不重偏伏𥐼砂白兼櫃大雌雄此草兼堪服食大治水氣之病紅焰草此草生於水中花紅葉緑味辛應是草結砂子及諸般石結砂子並於紅焰草中皆櫃十分無失地蕉草花紅子黑莖葉青伏藥偏清髙無過採地蕉不但抽眞汞兼伏石中硝地蕉能伏硝石抽汞實山草花紅葉緑靈草號寳山生居大林間仙家偏祕借價直萬千錢此草汁煑汞便成硬砂子亦櫃見寳砂小白禄草花紅莖蕚葉並青此草花紅葉緑生髙崗之上味辛每要伏人間飛走者藥膩粉水銀及食者之藥並皆燒無失也小金線草花紅葉緑靈草並光鮮金線力最堅便是稀砂子葉裹自然乾此草味辛生於大林之內能制大藥應活汞砂但將裏之入火便成寳也眞珠草靈苗櫃藥好無過眞珠草伏藥定無憂服食人不老此草汁味甘花黄生於深林之中遇者延年無病金鸞草大道秘金鸞仙家亦不傳堪作庚汞櫃採寳勝湧泉此草生於河次之畔黄花葉緑能制樞庚汞堪作湧泉櫃海石榴草花紅葉緑採汞不知休無過海石榴不遇靈草本將心那邊求此草味苦結得子却甘如是活汞粘著草汁便枯亦名枯汞草紅藍草缺聚珍草莖葉並緑天降號聚珍四季葉長青凡人多不識看似掌中金服食添長命生餐善治心不是眞仙本世間少知音此草生沙崗之上味甘能焼衆藥無失海桃草靈枝號海桃生服善治勞不但添人壽兼軟汞與錨此草生於大林之中大治勞疾花黄葉緑味苦能軟五金矣金燈草此草味教辛仙家喚金燈生服能治病一載自身輕伏砒砒能白結汞汞轉新不然濟人命兼取汞中庚此草味辛生於髙坡之上花紫葉緑抽汞伏庚山青草仙草名山青根株似黃精人服髮再黑偏療小兒驚燒藥堪爲櫃秋夏葉長新此草生於髙林之内味甘花紅葉青兼櫃硫黃萬通草大道依仙蹤方顯有神功三黄成眞體白虎是一宗金丹求靈草石櫃卒難窮欲知鉛汞了須採草萬通此草生於白沙之地味澁花青葉緑服之令人長壽無病偏櫃大藥不失白珠草黄花緑葉大道與仙同須向草中功金石能飛走靈草自相通但依眞仙草製向鉛汞中欲得金丹就採取草山紅此草生於髙崗之内或於土山之上花紅葉緑味甘人服之延命一千歳龍泉草萬物萌芽在春前只有龍泉出土先見寳朱砂用葉裹自然汁煑汞成乾此草生於深草之中花青子黑服之者令人身輕無病實峯草大道居鄽市訪道莫西東但求眞鉛汞四事緫相通聖事依指教不越大仙蹤欲知黄芽現須採草寳峯此草花紅葉緑子黑味辛服食令人一生無病身輕駐顏兼櫃大藥善取黄芽金錢草了道與延年無過訪金錢服食添人壽乾汞兼駐顏此草生於深草之内服食令人無病味甘花黄汁白葉緑獨成砂子仙娥草造化紫河車不及草仙娥能伏飛流藥大道知也麽此草生於青沙之地花黄葉緑味甘伏諸藥無失黄芽草花葉能青緑根白色似金黄芽生徧地識者有幾人此草根善治牙疼青金草黄花緑葉久聞有靈草不過青金好葉緑枝條嫩服食人不老此草生於水次偏治惡瘡七星草此草生於名山之中有人遇者生服之可以不死延年矣花青葉紅味甘兼制大藥山漿草山漿草味酸花紅生於黄沙之地偏治人間瘧病兼櫃硫黄銀線草花紅子黑莖葉青此草生於名山之中大治風疾之病花紅子黑味甘能伏𥐼砂宜男草花紅葉青枝萼並青此草生於名山之中有人得見便採服之壽命五百歳味甘花紅子青葉緑金羅草花黄枝葉青此草生於松樹之下花黄味辛遇者服之千年不死兼制大藥矣楊桃草棘紫草青楊桃草白汁生於棘鍼之上能伏朱砂大治惡瘡百金草花紅枝葉並青此草生於大林之内花紅味甘大伏眞汞秘曰七十二草緫有靈各伏丹砂並通神不是上方留下界凡世俗流少聽聞白雲仙人靈草歌終
